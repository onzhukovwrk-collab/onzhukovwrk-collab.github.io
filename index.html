<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pushwoosh Web SDK Demo</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .logo {
      width: 40px;
      height: 40px;
      background: #e94560;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 22px; font-weight: 600; }
    header p { font-size: 13px; opacity: 0.6; margin-top: 2px; }

    .status-bar {
      background: #fff;
      border-bottom: 1px solid #e8ecf0;
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #666;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
    }
    .status-dot.green { background: #22c55e; }
    .status-dot.orange { background: #f59e0b; }
    .status-dot.red { background: #ef4444; }

    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    .card.full-width { grid-column: 1 / -1; }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .icon.blue { background: #eff6ff; }
    .icon.green { background: #f0fdf4; }
    .icon.purple { background: #faf5ff; }
    .icon.orange { background: #fff7ed; }
    .icon.red { background: #fef2f2; }
    .icon.teal { background: #f0fdfa; }

    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background: #f8fafc;
      font-family: inherit;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #6366f1;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .field-label {
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 6px;
      margin-top: 12px;
    }

    .field-label:first-child { margin-top: 0; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      width: 100%;
      margin-top: 14px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }

    .btn-green { background: #22c55e; color: white; }
    .btn-green:hover:not(:disabled) { background: #16a34a; }

    .btn-red { background: #ef4444; color: white; }
    .btn-red:hover:not(:disabled) { background: #dc2626; }

    .btn-orange { background: #f59e0b; color: white; }
    .btn-orange:hover:not(:disabled) { background: #d97706; }

    .btn-purple { background: #8b5cf6; color: white; }
    .btn-purple:hover:not(:disabled) { background: #7c3aed; }

    .btn-teal { background: #14b8a6; color: white; }
    .btn-teal:hover:not(:disabled) { background: #0d9488; }

    .btn-outline {
      background: transparent;
      color: #6366f1;
      border: 1.5px solid #6366f1;
    }
    .btn-outline:hover:not(:disabled) { background: #eff0ff; }

    .result {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }

    .result.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }
    .result.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .result.info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; display: block; }

    .inbox-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .inbox-item {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .inbox-item:hover { border-color: #6366f1; background: #fafafe; }

    .inbox-item.unread { border-left: 3px solid #6366f1; }

    .inbox-item .msg-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .inbox-item .msg-body {
      font-size: 13px;
      color: #64748b;
      line-height: 1.4;
    }

    .inbox-item .msg-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .inbox-item .msg-date { font-size: 11px; color: #94a3b8; }

    .inbox-item .msg-actions {
      display: flex;
      gap: 6px;
    }

    .inbox-item .msg-btn {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .msg-btn.read-btn { background: #eff6ff; color: #2563eb; }
    .msg-btn.delete-btn { background: #fef2f2; color: #dc2626; }
    .msg-btn.open-btn { background: #f0fdf4; color: #15803d; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ef4444;
      color: white;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      min-width: 20px;
    }

    .inbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .inbox-counts {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #64748b;
    }

    .inbox-counts span strong { color: #1a1a2e; }

    .tag-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .tag-row input { flex: 1; margin-top: 0; }

    .add-tag-btn {
      padding: 10px 14px;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    .add-tag-btn:hover { background: #e2e8f0; }

    .remove-tag-btn {
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      flex-shrink: 0;
      color: #dc2626;
    }

    #tags-container { display: flex; flex-direction: column; gap: 8px; }

    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { margin-top: 0; }

    .empty-inbox {
      text-align: center;
      padding: 32px 16px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .container { grid-template-columns: 1fr; }
      .card.full-width { grid-column: 1; }
      header { padding: 16px 20px; }
      .status-bar { padding: 10px 20px; }
      .container { padding: 0 16px; margin: 16px auto; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🔔</div>
  <div>
    <h1>Pushwoosh Web SDK Demo</h1>
    <p>Application: 9A5E2-629F0</p>
  </div>
</header>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Initializing SDK...</span>
</div>

<div class="container">

  <!-- Subscribe / Unsubscribe -->
  <div class="card">
    <h2><span class="icon blue">🔔</span> Push Notifications</h2>

    <div class="btn-row">
      <button class="btn btn-green" id="btnSubscribe" onclick="doSubscribe()">
        ✅ Subscribe
      </button>
      <button class="btn btn-red" id="btnUnsubscribe" onclick="doUnsubscribe()" disabled>
        🚫 Unsubscribe
      </button>
    </div>

    <div id="subResult" class="result"></div>
  </div>

  <!-- User ID -->
  <div class="card">
    <h2><span class="icon purple">👤</span> User ID</h2>

    <div class="field-label">User ID</div>
    <input type="text" id="userIdInput" placeholder="e.g. user_12345" />

    <button class="btn btn-purple" onclick="doSetUserId()">Set User ID</button>

    <div id="userIdResult" class="result"></div>
  </div>

  <!-- Tags -->
  <div class="card full-width">
    <h2><span class="icon orange">🏷️</span> Tags</h2>

    <div id="tags-container">
      <div class="tag-row">
        <input type="text" placeholder="Tag name" class="tag-key" />
        <input type="text" placeholder="Tag value" class="tag-value" />
        <button class="remove-tag-btn" onclick="removeTagRow(this)">✕</button>
      </div>
    </div>

    <div style="margin-top:10px;">
      <button class="add-tag-btn" onclick="addTagRow()" title="Add tag">＋ Add tag</button>
    </div>

    <div class="btn-row" style="margin-top:14px;">
      <button class="btn btn-orange" onclick="doSetTags()" style="margin-top:0">Set Tags</button>
      <button class="btn btn-outline" onclick="doGetTags()" style="margin-top:0">Get Tags</button>
    </div>

    <div id="tagsResult" class="result"></div>
  </div>

  <!-- Post Event -->
  <div class="card">
    <h2><span class="icon teal">⚡</span> Post Event</h2>

    <div class="field-label">Event Name</div>
    <input type="text" id="eventName" placeholder="e.g. purchase, login, page_view" />

    <div class="field-label">Attributes (JSON)</div>
    <textarea id="eventAttrs" placeholder='{"amount": 9.99, "currency": "USD"}'></textarea>

    <button class="btn btn-teal" onclick="doPostEvent()">Send Event</button>

    <div id="eventResult" class="result"></div>
  </div>

  <!-- HWID & Token Info -->
  <div class="card">
    <h2><span class="icon green">ℹ️</span> Device Info</h2>

    <button class="btn btn-primary" onclick="doGetInfo()" style="margin-top:0">Load Device Info</button>

    <div id="infoResult" class="result"></div>
  </div>

  <!-- Inbox -->
  <div class="card full-width">
    <h2><span class="icon blue">📥</span> Inbox</h2>

    <div class="inbox-header">
      <div class="inbox-counts" id="inboxCounts" style="display:none">
        <span>Total: <strong id="inboxTotal">0</strong></span>
        <span>Unread: <strong id="inboxUnread">0</strong></span>
        <span>Pending action: <strong id="inboxPending">0</strong></span>
      </div>
      <button class="btn btn-primary" onclick="doLoadInbox()" style="width:auto;margin-top:0;padding:8px 16px;font-size:13px">
        🔄 Load Messages
      </button>
    </div>

    <div id="inboxResult" class="result"></div>
    <div class="inbox-list" id="inboxList">
      <div class="empty-inbox">Click "Load Messages" to fetch your inbox</div>
    </div>
  </div>

</div>

<!-- Pushwoosh SDK -->
<script type="text/javascript" src="//cdn.pushwoosh.com/webpush/v3/pushwoosh-web-notifications.js" async></script>
<script type="text/javascript">
  var Pushwoosh = Pushwoosh || [];

  Pushwoosh.push(['init', {
    logLevel: 'info',
    applicationCode: '9A5E2-629F0',
    apiToken: 'qNJYl6Qj66EG8E7x4L2mRKSA7AQLhjMWtr0rDXduarwMjx9c5qk56rD1Dv6SiGej3bYIOkw5g9mr2q1Bqi1r',
    defaultNotificationTitle: 'Pushwoosh Demo',
    autoSubscribe: false,
    inboxWidget: {
      enable: false
    }
  }]);

  Pushwoosh.push(['onReady', function(api) {
    updateStatus();
  }]);

  Pushwoosh.push(['onSubscribe', function() {
    updateStatus();
  }]);

  Pushwoosh.push(['onUnsubscribe', function() {
    updateStatus();
  }]);

  // ── Status bar ────────────────────────────────────────────────────

  async function updateStatus() {
    try {
      Pushwoosh.push(async function(api) {
        const subscribed = await Pushwoosh.isSubscribed();
        const dot  = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        const btnSub   = document.getElementById('btnSubscribe');
        const btnUnsub = document.getElementById('btnUnsubscribe');

        if (subscribed) {
          dot.className  = 'status-dot green';
          text.textContent = 'Subscribed to push notifications';
          btnSub.disabled   = true;
          btnUnsub.disabled = false;
        } else {
          dot.className  = 'status-dot orange';
          text.textContent = 'Not subscribed';
          btnSub.disabled   = false;
          btnUnsub.disabled = true;
        }
      });
    } catch(e) {
      document.getElementById('statusDot').className = 'status-dot red';
      document.getElementById('statusText').textContent = 'SDK not available';
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────

  function showResult(id, message, type) {
    const el = document.getElementById(id);
    el.textContent = message;
    el.className = 'result ' + type;
  }

  // ── Subscribe ─────────────────────────────────────────────────────

  function doSubscribe() {
    Pushwoosh.push(async function() {
      try {
        await Pushwoosh.subscribe();
        showResult('subResult', '✅ Successfully subscribed!', 'success');
        updateStatus();
      } catch(e) {
        showResult('subResult', '❌ ' + (e.message || e), 'error');
      }
    });
  }

  // ── Unsubscribe ───────────────────────────────────────────────────

  function doUnsubscribe() {
    Pushwoosh.push(async function() {
      try {
        await Pushwoosh.unsubscribe();
        showResult('subResult', '🔕 Successfully unsubscribed.', 'info');
        updateStatus();
      } catch(e) {
        showResult('subResult', '❌ ' + (e.message || e), 'error');
      }
    });
  }

  // ── User ID ───────────────────────────────────────────────────────

  function doSetUserId() {
    const userId = document.getElementById('userIdInput').value.trim();
    if (!userId) {
      showResult('userIdResult', '⚠️ Please enter a User ID.', 'error');
      return;
    }
    Pushwoosh.push(async function(api) {
      try {
        await api.registerUser(userId);
        showResult('userIdResult', '✅ User ID set: ' + userId, 'success');
      } catch(e) {
        showResult('userIdResult', '❌ ' + (e.message || e), 'error');
      }
    });
  }

  // ── Tags ──────────────────────────────────────────────────────────

  function addTagRow() {
    const container = document.getElementById('tags-container');
    const row = document.createElement('div');
    row.className = 'tag-row';
    row.innerHTML = `
      <input type="text" placeholder="Tag name" class="tag-key" />
      <input type="text" placeholder="Tag value" class="tag-value" />
      <button class="remove-tag-btn" onclick="removeTagRow(this)">✕</button>
    `;
    container.appendChild(row);
  }

  function removeTagRow(btn) {
    const rows = document.querySelectorAll('#tags-container .tag-row');
    if (rows.length > 1) btn.parentElement.remove();
  }

  function doSetTags() {
    const keys   = document.querySelectorAll('.tag-key');
    const values = document.querySelectorAll('.tag-value');
    const tags   = {};

    let hasTag = false;
    for (let i = 0; i < keys.length; i++) {
      const k = keys[i].value.trim();
      const v = values[i].value.trim();
      if (k) { tags[k] = v; hasTag = true; }
    }

    if (!hasTag) {
      showResult('tagsResult', '⚠️ Add at least one tag.', 'error');
      return;
    }

    Pushwoosh.push(async function(api) {
      try {
        await api.setTags(tags);
        showResult('tagsResult', '✅ Tags set: ' + JSON.stringify(tags), 'success');
      } catch(e) {
        showResult('tagsResult', '❌ ' + (e.message || e), 'error');
      }
    });
  }

  function doGetTags() {
    Pushwoosh.push(function(api) {
      try {
        const tags = api.getTags();
        const text = Object.keys(tags).length
          ? JSON.stringify(tags, null, 2)
          : '(no tags set)';
        showResult('tagsResult', '🏷️ ' + text, 'info');
      } catch(e) {
        showResult('tagsResult', '❌ ' + (e.message || e), 'error');
      }
    });
  }

  // ── Post Event ────────────────────────────────────────────────────

  function doPostEvent() {
    const name  = document.getElementById('eventName').value.trim();
    const attrs = document.getElementById('eventAttrs').value.trim();

    if (!name) {
      showResult('eventResult', '⚠️ Please enter an event name.', 'error');
      return;
    }

    let parsedAttrs = {};
    if (attrs) {
      try { parsedAttrs = JSON.parse(attrs); }
      catch(e) {
        showResult('eventResult', '❌ Invalid JSON in attributes.', 'error');
        return;
      }
    }

    Pushwoosh.push(async function(api) {
      try {
        await api.postEvent(name, parsedAttrs);
        showResult('eventResult', '✅ Event "' + name + '" sent!', 'success');
      } catch(e) {
        showResult('eventResult', '❌ ' + (e.message || e), 'error');
      }
    });
  }

  // ── Device Info ───────────────────────────────────────────────────

  function doGetInfo() {
    Pushwoosh.push(async function(api) {
      try {
        const hwid  = await Pushwoosh.getHWID();
        const token = await Pushwoosh.getPushToken();
        const userId = await Pushwoosh.getUserId();
        const lines = [
          'HWID: ' + (hwid || '—'),
          'Push Token: ' + (token || '—'),
          'User ID: ' + (userId || '—')
        ];
        showResult('infoResult', lines.join('\n'), 'info');
      } catch(e) {
        showResult('infoResult', '❌ ' + (e.message || e), 'error');
      }
    });
  }

  // ── Inbox ─────────────────────────────────────────────────────────

  async function doLoadInbox() {
    const resultEl = document.getElementById('inboxResult');
    const listEl   = document.getElementById('inboxList');

    Pushwoosh.push(async function() {
      try {
        const inbox = Pushwoosh.pwinbox;

        await inbox.syncMessages();
        const messages = await inbox.loadMessages();
        const total    = await inbox.messagesCount();
        const unread   = await inbox.unreadMessagesCount();
        const pending  = await inbox.messagesWithNoActionPerformedCount();

        document.getElementById('inboxCounts').style.display = 'flex';
        document.getElementById('inboxTotal').textContent   = total;
        document.getElementById('inboxUnread').textContent  = unread;
        document.getElementById('inboxPending').textContent = pending;

        resultEl.className = 'result';

        if (!messages || messages.length === 0) {
          listEl.innerHTML = '<div class="empty-inbox">📭 No messages in your inbox</div>';
          return;
        }

        listEl.innerHTML = '';
        messages.forEach(function(msg) {
          const item = document.createElement('div');
          item.className = 'inbox-item' + (msg.isRead ? '' : ' unread');
          item.innerHTML = `
            <div class="msg-title">${escapeHtml(msg.title || '(no title)')}</div>
            <div class="msg-body">${escapeHtml(msg.message || '')}</div>
            <div class="msg-meta">
              <span class="msg-date">${formatDate(msg.sendDate)}</span>
              <div class="msg-actions">
                ${!msg.isRead ? `<button class="msg-btn read-btn" onclick="markRead('${msg.code}', this)">Mark read</button>` : ''}
                ${msg.link ? `<button class="msg-btn open-btn" onclick="openMsg('${msg.code}')">Open</button>` : ''}
                <button class="msg-btn delete-btn" onclick="deleteMsg('${msg.code}', this)">Delete</button>
              </div>
            </div>
          `;
          listEl.appendChild(item);
        });

      } catch(e) {
        showResult('inboxResult', '❌ ' + (e.message || e), 'error');
      }
    });
  }

  function markRead(code, btn) {
    Pushwoosh.push(async function() {
      await Pushwoosh.pwinbox.readMessagesWithCodes([code]);
      btn.closest('.inbox-item').classList.remove('unread');
      btn.remove();
      doLoadInbox();
    });
  }

  function openMsg(code) {
    Pushwoosh.push(async function() {
      await Pushwoosh.pwinbox.performActionForMessageWithCode(code);
    });
  }

  function deleteMsg(code, btn) {
    Pushwoosh.push(async function() {
      await Pushwoosh.pwinbox.deleteMessagesWithCodes([code]);
      btn.closest('.inbox-item').remove();
      doLoadInbox();
    });
  }

  // ── Utils ─────────────────────────────────────────────────────────

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleString(); }
    catch(e) { return iso; }
  }

  // Init status check after SDK loads
  window.addEventListener('load', function() {
    setTimeout(updateStatus, 2000);
  });
</script>

</body>
</html>
